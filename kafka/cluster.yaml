apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: logistream-kafka
  namespace: logistream
  annotations:
    strimzi.io/node-pools: "enabled"
spec:
  kafka:
    version: 4.1.1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: external
        port: 9094
        type: loadbalancer
        tls: false
    config:
      num.partitions: 3
      default.replication.factor: 3
      min.insync.replicas: 2
      log.retention.hours: 168
      message.max.bytes: 10240
  entityOperator:
    topicOperator: {}
    userOperator: {}
